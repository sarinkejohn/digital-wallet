version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: digital-wallet-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - wallet-network

  prometheus:
    image: prom/prometheus:latest
    container_name: digital-wallet-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    restart: unless-stopped
    networks:
      - wallet-network

  grafana:
    image: grafana/grafana:latest
    container_name: digital-wallet-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - wallet-network

volumes:
  redis_data:
  grafana_data:

networks:
  wallet-network:
    driver: bridge