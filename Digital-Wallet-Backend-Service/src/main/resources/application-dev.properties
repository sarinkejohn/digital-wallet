
# APP

spring.application.name=Digital-Wallet-Backend-Service


# DB

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5438/digital_wallet_db}
spring.datasource.username=${DB_USER:test}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}


# JPA / HIBERNATE

spring.jpa.show-sql=false
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false


# JWT

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}


# BUSINESS RULES

wallet.transfer.min-amount=1.0
wallet.transfer.max-amount=100000.0
wallet.topup.max-amount=1000000.0

# AUTH SECURITY

auth.max-login-attempts=${AUTH_MAX_LOGIN_ATTEMPTS:5}
auth.lockout-duration-minutes=${AUTH_LOCKOUT_DURATION:5}
auth.bcrypt-rounds=${BCRYPT_ROUNDS:10}


# SWAGGER / OPENAPI

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# OBSERVABILITY

# Metrics + tracing sampling
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0

# Jaeger (OpenTelemetry exporter)
# OpenTelemetry exporter (modern way)
otel.traces.exporter=otlp
otel.exporter.otlp.endpoint=http://jaeger:4317
